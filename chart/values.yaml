image:
  repository: ghcr.io/mchmarny/node-role-controller
  tag: "latest"
  pullPolicy: IfNotPresent

config:
  roleLabel: "nodeGroup"
  roleReplace: "false"
  logLevel: "info"

replicas: 1

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

tolerations: []

nodeSelector: {}
