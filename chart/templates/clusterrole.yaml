apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: node-role-labeler
  labels:
    {{- include "node-role-controller.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["list", "watch", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update"]
