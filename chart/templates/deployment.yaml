apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "node-role-controller.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "node-role-controller.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "node-role-controller.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "node-role-controller.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "node-role-controller.fullname" . }}
      terminationGracePeriodSeconds: 10
      containers:
        - name: {{ include "node-role-controller.name" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: ROLE_LABEL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "node-role-controller.fullname" . }}-config
                  key: roleLabel
            - name: ROLE_LABEL_REPLACE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "node-role-controller.fullname" . }}-config
                  key: roleReplace
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "node-role-controller.fullname" . }}-config
                  key: logLevel
            - name: NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8080
              name: metrics
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      restartPolicy: Always
