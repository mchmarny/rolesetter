apiVersion: v1
kind: Namespace
metadata:
  name: node-labeler
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: node-role-controller
  namespace: node-labeler
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: node-role-labeler
rules:
- apiGroups:
  - ""
  resources:
  - nodes
  verbs:
  - list
  - watch
  - patch
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - create
  - update
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: node-role-labeler
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: node-role-labeler
subjects:
- kind: ServiceAccount
  name: node-role-controller
  namespace: node-labeler
---
apiVersion: v1
data:
  logLevel: info
  roleLabel: nodeGroup
  roleReplace: "false"
kind: ConfigMap
metadata:
  name: node-role-controller-config
  namespace: node-labeler
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: node-role-controller
  name: node-role-controller
  namespace: node-labeler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: node-role-controller
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: node-role-controller
    spec:
      containers:
      - env:
        - name: ROLE_LABEL
          valueFrom:
            configMapKeyRef:
              key: roleLabel
              name: node-role-controller-config
        - name: ROLE_LABEL_REPLACE
          valueFrom:
            configMapKeyRef:
              key: roleReplace
              name: node-role-controller-config
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              key: logLevel
              name: node-role-controller-config
        - name: NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        image: ghcr.io/mchmarny/node-role-controller:latest
        livenessProbe:
          httpGet:
            path: /healthz
            port: metrics
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
        name: node-role-controller
        ports:
        - containerPort: 8080
          name: metrics
        readinessProbe:
          httpGet:
            path: /readyz
            port: metrics
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        resources:
          limits:
            cpu: 250m
            memory: 256Mi
          requests:
            cpu: 50m
            memory: 64Mi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          seccompProfile:
            type: RuntimeDefault
      restartPolicy: Always
      serviceAccountName: node-role-controller
      terminationGracePeriodSeconds: 10
