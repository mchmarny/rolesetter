name: on_push

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  versions:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      go: ${{ steps.v.outputs.go }}
      golangci_lint: ${{ steps.v.outputs.golangci_lint }}
      scan_severity: ${{ steps.v.outputs.scan_severity }}
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
    - name: Load versions
      id: v
      uses: ./.github/actions/load-versions

  helm-lint:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
    - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4  # v4.3.1
    - run: helm lint chart/

  test:
    needs: [versions]
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
    - uses: mchmarny/common/go-test@994d32fc6dcff3e6006a59db9d20b9e201423cb4  # main
      with:
        go-version: ${{ needs.versions.outputs.go }}
        scan-severity: ${{ needs.versions.outputs.scan_severity }}
        linter-version: ${{ needs.versions.outputs.golangci_lint }}
