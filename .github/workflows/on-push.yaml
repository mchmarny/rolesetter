name: on_push

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  helm-lint:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
    - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4  # v4.3.1
    - run: helm lint chart/

  test:
    timeout-minutes: 15
    env:
      GO_VERSION: "1.25.0"
      ERR_VULNERABILITY_SEV: "CRITICAL,HIGH,MEDIUM"
      LINTER_VERSION: "v2.4.0"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
    - uses: mchmarny/common/go-test@994d32fc6dcff3e6006a59db9d20b9e201423cb4  # main
      with:
        go-version: ${{ env.GO_VERSION }}
        scan-severity: ${{ env.ERR_VULNERABILITY_SEV }}
        linter-version: ${{ env.LINTER_VERSION }}
