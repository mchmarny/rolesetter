name: on_push

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  helm-lint:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4  # v4.3.1
    - run: helm lint chart/

  test:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      id-token: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

    - name: Load versions
      id: versions
      uses: ./.github/actions/load-versions

    - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00  # v6.0.0
      with:
        go-version: ${{ steps.versions.outputs.go }}
        cache: true
        cache-dependency-path: go.sum

    - name: Tidy
      run: go mod tidy

    - name: Test
      run: |
        go test -count=1 -covermode=atomic -coverprofile=coverage.out ./...
        go tool cover -func=coverage.out

    - name: Coverage
      uses: codecov/codecov-action@5a1091511ad55cbe89839c7260b706298ca349f7  # v5.5.1
      with:
        fail_ci_if_error: true
        use_oidc: true

    - name: Lint Go
      uses: golangci/golangci-lint-action@4afd733a84b1f43292c63897423277bb7f4313a9  # v8.0.0
      with:
        version: ${{ steps.versions.outputs.golangci_lint }}

    - name: Lint YAML
      uses: karancode/yamllint-github-action@4052d365f09b8d34eb552c363d1141fd60e2aeb2  # v3.0.0
      with:
        yamllint_config_filepath: .yamllint

    - name: Install Trivy
      env:
        TRIVY_VERSION: "0.62.2"
      run: |
        wget -q "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.deb"
        sudo dpkg -i "trivy_${TRIVY_VERSION}_Linux-64bit.deb"
        trivy --version

    - name: Scan
      run: |
        trivy fs . \
          --ignore-unfixed \
          --format sarif \
          --output trivy-results.sarif \
          --severity ${{ steps.versions.outputs.scan_severity }} \
          --exit-code 1

    - name: Upload Scan Results
      if: always()
      uses: github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e  # v4.32.4
      with:
        sarif_file: trivy-results.sarif
