name: on_tag
on:
  push:
    tags:
    - 'v[0-9]+.[0-9]+.[0-9]+'  # Only build tag with semantic versioning format

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:

  release:
    timeout-minutes: 30
    env:
      IMAGE_NAME: node-role-controller
      GO_VERSION: '1.25.0'
      COSIGN_VERSION: v2.5.0
      KIND_VERSION: '0.29.0'
      K8S_VERSION: '1.33.x'
      ERR_VULNERABILITY_SEV: 'CRITICAL,HIGH,MEDIUM'
      DEPLOYMENT_PATCH_FILE: deployment/overlays/dev/patch-deployment.yaml
      WORKER_NODE_COUNT: '2'
    outputs:
      image-uri: ${{ steps.build.outputs.image-uri }}
      image-name: ${{ steps.build.outputs.image-name }}
      image-digest: ${{ steps.build.outputs.image-digest }}
      cosign-version: ${{ env.COSIGN_VERSION }}
      source-uri: "github.com/${{ github.repository }}"
      source-tag: ${{ github.ref_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      id-token: write
      packages: write
    steps:

    - name: Build Image
      uses: mchmarny/common/go-build@994d32fc6dcff3e6006a59db9d20b9e201423cb4  # main
      id: build
      with:
        image-uri: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
        go-version: ${{ env.GO_VERSION }}
        release-version: ${{ github.ref_name }}
        registry-username: ${{ github.actor }}
        registry-password: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup KinD Cluster
      uses: chainguard-dev/actions/setup-kind@1b32103f5aa389c31ab0be75a8edc38d7e4750d8  # v1.5.7
      with:
        kind-version: ${{ env.KIND_VERSION }}
        k8s-version: ${{ env.K8S_VERSION }}
        kind-worker-count: "${{ env.WORKER_NODE_COUNT }}"
    - name: Set Dev Image
      run: tests/set-dev-image ${{ steps.build.outputs.image-uri }} ${{ env.DEPLOYMENT_PATCH_FILE }}
    - name: Run Integration Tests
      run: tests/integration "${{ env.WORKER_NODE_COUNT }}"

    - name: Scan Image
      uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8  # 0.33.1
      with:
        scan-type: image
        severity: ${{ env.ERR_VULNERABILITY_SEV }}
        image-ref: ${{ steps.build.outputs.image-uri }}
        github-pat: ${{ secrets.GITHUB_TOKEN }}
        format: sarif
        output: trivy-results.sarif
        hide-progress: true
        timeout: "10m"
        exit-code: "1"
    - name: Upload Scan Results
      if: always()
      uses: github/codeql-action/upload-sarif@16df4fbc19aea13d921737861d6c622bf3cefe23  # v2.23.0
      with:
        sarif_file: trivy-results.sarif

  helm-publish:
    needs: [release]
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@de0fac2e8bbb1e8ccbaaab4b69ef85bd70f69aa5  # v6.0.2
    - uses: azure/setup-helm@1a275c3b47b68f33e44868e144afbc17ee0c933f  # v4.3.1
    - name: Login to GHCR
      run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
    - name: Package and Push Chart
      run: |
        TAG=${{ github.ref_name }}
        sed -i "s/^version:.*/version: ${TAG#v}/" chart/Chart.yaml
        sed -i "s/^appVersion:.*/appVersion: \"${TAG#v}\"/" chart/Chart.yaml
        helm package chart/
        helm push node-role-controller-${TAG#v}.tgz oci://ghcr.io/mchmarny

  provenance:
    needs: [release]
    timeout-minutes: 15
    permissions:
      actions: read
      id-token: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0  # Must use tagged version
    with:
      image: ${{ needs.release.outputs.image-name }}
      digest: ${{ needs.release.outputs.image-digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  verification:
    needs: [release, provenance]
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: slsa-framework/slsa-verifier/actions/installer@ea584f4502babc6f60d9bc799dbbb13c1caa9ee6  # v2.7.1
    - name: Verify SLSA Provenance (slsa-verifier)
      shell: bash
      run: |-
        slsa-verifier verify-image ${{ needs.release.outputs.image-uri }} \
          --source-uri "${{ needs.release.outputs.source-uri }}" \
          --source-tag "${{ needs.release.outputs.source-tag }}"
