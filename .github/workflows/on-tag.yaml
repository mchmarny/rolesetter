name: on_tag
on:
  push:
    tags:
    - 'v[0-9]+.[0-9]+.[0-9]+'  # Only build tag with semantic versioning format

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:

  versions:
    timeout-minutes: 5
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      go: ${{ steps.v.outputs.go }}
      scan_severity: ${{ steps.v.outputs.scan_severity }}
      registry: ${{ steps.v.outputs.registry }}
      kind_version: ${{ steps.v.outputs.kind_version }}
      k8s_version: ${{ steps.v.outputs.k8s_version }}
      worker_node_count: ${{ steps.v.outputs.worker_node_count }}
      cosign: ${{ steps.v.outputs.cosign }}
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - name: Load versions
      id: v
      uses: ./.github/actions/load-versions

  release:
    needs: [versions]
    timeout-minutes: 30
    env:
      IMAGE_NAME: node-role-controller
      DEPLOYMENT_PATCH_FILE: deployment/overlays/dev/patch-deployment.yaml
    outputs:
      image-uri: ${{ steps.build.outputs.image-uri }}
      image-name: ${{ steps.build.outputs.image-name }}
      image-digest: ${{ steps.build.outputs.image-digest }}
      cosign-version: ${{ needs.versions.outputs.cosign }}
      source-uri: "github.com/${{ github.repository }}"
      source-tag: ${{ github.ref_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      id-token: write
      packages: write
    steps:

    - name: Build Image
      uses: mchmarny/common/go-build@eba3b1848a7cacb533285a15b01509d020513f25  # main
      id: build
      with:
        image-uri: ${{ needs.versions.outputs.registry }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
        go-version: ${{ needs.versions.outputs.go }}
        release-version: ${{ github.ref_name }}
        registry-username: ${{ github.actor }}
        registry-password: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup KinD Cluster
      uses: chainguard-dev/actions/setup-kind@eab208ef2d05b13404296a5e194a6b237e8bb213  # v1.6.4
      with:
        kind-version: ${{ needs.versions.outputs.kind_version }}
        k8s-version: ${{ needs.versions.outputs.k8s_version }}
        kind-worker-count: ${{ needs.versions.outputs.worker_node_count }}
    - name: Set Dev Image
      run: tests/set-dev-image ${{ steps.build.outputs.image-uri }} ${{ env.DEPLOYMENT_PATCH_FILE }}
    - name: Run Integration Tests
      run: tests/integration ${{ needs.versions.outputs.worker_node_count }}

    - name: Scan Image
      uses: aquasecurity/trivy-action@e368e328979b113139d6f9068e03accaed98a518  # 0.34.1
      with:
        scan-type: image
        severity: ${{ needs.versions.outputs.scan_severity }}
        image-ref: ${{ steps.build.outputs.image-uri }}
        github-pat: ${{ secrets.GITHUB_TOKEN }}
        format: sarif
        output: trivy-results.sarif
        hide-progress: true
        timeout: "10m"
        exit-code: "1"
    - name: Upload Scan Results
      if: always()
      uses: github/codeql-action/upload-sarif@89a39a4e59826350b863aa6b6252a07ad50cf83e  # v4.32.4
      with:
        sarif_file: trivy-results.sarif

  helm-publish:
    needs: [release]
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4  # v4.3.1
    - name: Login to GHCR
      run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
    - name: Package and Push Chart
      run: |
        TAG=${{ github.ref_name }}
        sed -i "s/^version:.*/version: ${TAG#v}/" chart/Chart.yaml
        sed -i "s/^appVersion:.*/appVersion: \"${TAG#v}\"/" chart/Chart.yaml
        helm package chart/
        helm push node-role-controller-${TAG#v}.tgz oci://ghcr.io/mchmarny

  provenance:
    needs: [release]
    permissions:
      actions: read
      id-token: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0  # Must use tagged version
    with:
      image: ${{ needs.release.outputs.image-name }}
      digest: ${{ needs.release.outputs.image-digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  verification:
    needs: [release, provenance]
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: slsa-framework/slsa-verifier/actions/installer@ea584f4502babc6f60d9bc799dbbb13c1caa9ee6  # v2.7.1
    - name: Verify SLSA Provenance (slsa-verifier)
      shell: bash
      run: |-
        slsa-verifier verify-image ${{ needs.release.outputs.image-uri }} \
          --source-uri "${{ needs.release.outputs.source-uri }}" \
          --source-tag "${{ needs.release.outputs.source-tag }}"
