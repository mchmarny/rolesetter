name: on_tag
on:
  push:
    tags:
    - 'v[0-9]+.[0-9]+.[0-9]+'  # Only build tag with semantic versioning format

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:

  test:
    uses: ./.github/workflows/test.yaml
    permissions:
      contents: read
      security-events: write
      id-token: write

  release:
    needs: [test]
    timeout-minutes: 30
    env:
      DEPLOYMENT_PATCH_FILE: deployment/overlays/dev/patch-deployment.yaml
    outputs:
      image-uri: ${{ steps.image.outputs.uri }}
      image-name: ${{ steps.image.outputs.name }}
      image-digest: ${{ steps.image.outputs.digest }}
      source-uri: "github.com/${{ github.repository }}"
      source-tag: ${{ github.ref_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      security-events: write
      id-token: write
      packages: write
      attestations: write
    steps:

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        fetch-depth: 0

    - name: Load versions
      id: versions
      uses: ./.github/actions/load-versions

    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
      with:
        go-version: ${{ steps.versions.outputs.go }}
        cache: true
        cache-dependency-path: go.sum

    - name: Install GoReleaser
      uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29  # v7.0.0
      with:
        install-only: true
        version: ${{ steps.versions.outputs.goreleaser }}

    - name: Login to GHCR
      uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121  # v4.1.0
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: make release

    - name: Extract Image Metadata
      id: image
      run: |
        set -euo pipefail
        jq -r '.[] | select(.type == "Docker Manifest")' dist/artifacts.json
        DIGEST=$(jq -r '[.[] | select(.type == "Docker Manifest")] | first | .extra.Digest' dist/artifacts.json)
        REPO=$(jq -r '[.[] | select(.type == "Docker Manifest")] | first | .path' dist/artifacts.json)
        if [ -z "$REPO" ] || [ "$REPO" = "null" ]; then
          REPO=$(jq -r '[.[] | select(.type == "Docker Manifest")] | first | .name' dist/artifacts.json)
        fi
        # Strip any tag or digest suffix to get bare repository name
        REPO="${REPO%%@*}"
        REPO="${REPO%%:*}"
        echo "uri=${REPO}@${DIGEST}" >> "$GITHUB_OUTPUT"
        echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
        echo "name=${REPO}" >> "$GITHUB_OUTPUT"

    - name: Setup KinD Cluster
      uses: chainguard-dev/actions/setup-kind@de68b87302e6266db5fb5220246f8aa46fe94b67  # v1.6.14
      with:
        kind-version: ${{ steps.versions.outputs.kind_version }}
        k8s-version: ${{ steps.versions.outputs.k8s_version }}
        kind-worker-count: ${{ steps.versions.outputs.worker_node_count }}

    - name: Set Dev Image
      run: tests/set-dev-image ${{ steps.image.outputs.uri }} ${{ env.DEPLOYMENT_PATCH_FILE }}

    - name: Run Integration Tests
      run: tests/integration ${{ steps.versions.outputs.worker_node_count }}

    - name: Install Trivy
      run: |
        sudo apt-get install -y wget apt-transport-https gnupg
        wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
        echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
        sudo apt-get update
        sudo apt-get install -y trivy

    - name: Scan Image
      run: |
        trivy image ${{ steps.image.outputs.uri }} \
          --format sarif \
          --output trivy-results.sarif \
          --severity ${{ steps.versions.outputs.scan_severity }} \
          --timeout 10m \
          --exit-code 1

    - name: Upload Scan Results
      if: always()
      uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225  # v4.35.2
      with:
        sarif_file: trivy-results.sarif

  helm-publish:
    needs: [release]
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
    - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2  # v5.0.0
    - name: Login to GHCR
      run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
    - name: Package and Push Chart
      run: |
        TAG=${{ github.ref_name }}
        sed -i "s/^version:.*/version: ${TAG#v}/" chart/Chart.yaml
        sed -i "s/^appVersion:.*/appVersion: \"${TAG#v}\"/" chart/Chart.yaml
        helm package chart/
        helm push node-role-controller-${TAG#v}.tgz oci://ghcr.io/mchmarny

  provenance:
    needs: [release]
    permissions:
      actions: read
      id-token: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.1.0  # Must use tagged version
    with:
      image: ${{ needs.release.outputs.image-name }}
      digest: ${{ needs.release.outputs.image-digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}

  verification:
    needs: [release, provenance]
    timeout-minutes: 10
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: slsa-framework/slsa-verifier/actions/installer@ea584f4502babc6f60d9bc799dbbb13c1caa9ee6  # v2.7.1
    - name: Verify SLSA Provenance (slsa-verifier)
      run: |-
        slsa-verifier verify-image ${{ needs.release.outputs.image-uri }} \
          --source-uri "${{ needs.release.outputs.source-uri }}" \
          --source-tag "${{ needs.release.outputs.source-tag }}"
