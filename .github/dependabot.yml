version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    labels: ["dependencies"]
    commit-message:
      prefix: "chore: deps"
    groups:
      go-dependencies:
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directories:
      - "/.github/**"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 1
    labels: ["dependencies"]
    commit-message:
      prefix: "chore: deps"
    groups:
      actions:
        patterns: ["*"]